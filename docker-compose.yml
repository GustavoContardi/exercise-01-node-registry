# TODO: Define your services
#
# Requirements:
# - Service "db": PostgreSQL (postgres:16-alpine)
# - Service "api": your Dockerfile, depends on db
# - api exposes port 8080 on the host
# - Use environment variables from .env for DB credentials
# - Do NOT hardcode passwords in this file

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"

volumes:
  pgdata: